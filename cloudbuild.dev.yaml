# Cloud Build — DEVELOPMENT environment
# Trigger config: set "Cloud Build configuration file location" to cloudbuild.dev.yaml
# No substitution variables needed in the trigger — all defaults are defined here.

substitutions:
  _ENVIRONMENT: dev
  _SERVICE_NAME: gym-frontend-dev
  _REGION: asia-southeast1
  _AR_REPOSITORY: gym-frontend
  _IMAGE_NAME: gym-frontend
  _API_BASE_URL: https://gym-backend-dev-116977847088.asia-southeast1.run.app/api

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${_ENVIRONMENT}-${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${_ENVIRONMENT}-latest"
      - "--build-arg"
      - "NEXT_PUBLIC_API_BASE_URL=${_API_BASE_URL}"
      - "."
    id: "build-image"

  # Push image tagged with commit SHA
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${_ENVIRONMENT}-${SHORT_SHA}"
    id: "push-image-commit"
    waitFor: ["build-image"]

  # Push image tagged as latest for environment
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${_ENVIRONMENT}-latest"
    id: "push-image-latest"
    waitFor: ["build-image"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${_ENVIRONMENT}-${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
      - "--timeout"
      - "300"
      - "--set-env-vars"
      - "NODE_ENV=production"
    id: "deploy-cloud-run"
    waitFor: ["push-image-commit"]

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: "ALLOW_LOOSE"

timeout: "1800s"
